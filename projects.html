<!DOCTYPE html>
<html>
<head>
<title>Projects | Thomas Argo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f2027;
color:#e6f1ff;
display:flex;
flex-direction:column;
min-height:100vh;
overflow-x:hidden;
}

a{
text-decoration:none;
color:inherit;
}
  
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
background:#111;
padding:15px 40px;
display:flex;
justify-content:flex-start;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
margin-right:30px;
font-size:18px;
font-weight:bold;
}

main{
flex:1;
max-width:1000px;
margin:140px auto 60px auto;
padding:0 20px;
text-align:center;
}

.card{
background:#1e90ff;
color:white;
padding:50px;
margin:30px;
border-radius:15px;
display:inline-block;
width:260px;
font-size:20px;
text-align:center;
transition:all 0.15s ease;

/* solid bottom shadow */
box-shadow:0 8px 0 #0d6efd;
}

.card:hover{
transform:translateY(4px);
box-shadow:0 4px 0 #0d6efd;
}

@media (max-width: 768px){

main{
display:flex;
flex-direction:column;
align-items:center;
}

.card{
display:block;
width:90%;
margin:20px 0;
}

}
  
footer{
text-align:center;
padding:25px 0;
background:#111;
color:#aaa;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
<a href="index.html">Home</a>
<a href="projects.html">Projects</a>
<a href="contact.html">Contact</a>
</nav>

<main>
<h1>Project Categories</h1>

<a href="models.html"><div class="card">3D Models</div></a>
<a href="websites.html"><div class="card">Websites</div></a>
<a href="apps.html"><div class="card">Apps</div></a>
</main>

<footer>
Thomas J. Argo © 2026
</footer>

<script>
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<160;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*4+1,
s:Math.random()*1.5+0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(255,255,255,0.5)";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y-=p.s;
if(p.y<0)p.y=canvas.height;
});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>

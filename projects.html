<!DOCTYPE html>
<html>
<head>
<title>Projects | Thomas Argo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f2027;
color:#e6f1ff;
display:flex;
flex-direction:column;
min-height:100vh;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
background:#111;
padding:15px 40px;
display:flex;
gap:30px;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
}

main{
flex:1;
max-width:1100px;
margin:140px auto 60px auto;
padding:0 20px;
text-align:center;
}

h1{
font-size:2.8em;
margin-bottom:50px;
}

/* FLEX CONTAINER FOR CARDS */
.categories{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:40px;
max-width:700px;
margin:0 auto;  
}

/* CARD STYLE */
.card{
background:#1e90ff;
color:white;
width:300px;
height:130px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
transition:all 0.15s ease;
text-decoration:none;

/* clean solid depth */
box-shadow:
0 8px 0 #0d6efd,
0 15px 25px rgba(0,0,0,0.25);
}

.card:hover{
transform:translateY(4px);
box-shadow:
0 4px 0 #0d6efd,
0 10px 20px rgba(0,0,0,0.25);
}

/* MOBILE FIX */
@media (max-width: 768px){

.categories{
flex-direction:column;
align-items:center;
}

.card{
width:90%;
max-width:400px;
}

}

footer{
text-align:center;
padding:25px 0;
background:#111;
color:#aaa;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
<a href="index.html">Home</a>
<a href="projects.html">Projects</a>
<a href="contact.html">Contact</a>
</nav>

<main>
<h1>Project Categories</h1>

<div class="categories">
<a href="models.html" class="card">3D Models</a>
<a href="websites.html" class="card">Websites</a>
<a href="apps.html" class="card">Apps</a>
</div>

</main>

<footer>
Thomas J. Argo © 2026
</footer>

<script>
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<160;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*4+1,
s:Math.random()*1.5+0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(255,255,255,0.5)";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y-=p.s;
if(p.y<0)p.y=canvas.height;
});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>

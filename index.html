<!DOCTYPE html>
<html>
<head>
<title>Thomas J. Argo | Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f2027;
color:white;
overflow-x:hidden;
}

/* Particle Background */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* Navigation */
nav{
position:fixed;
top:0;
width:100%;
background:#111;
padding:15px 40px;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
margin-right:25px;
font-weight:bold;
}

nav a:hover{opacity:.7;}

/* Layout */
.container{
max-width:1000px;
margin:120px auto 60px auto;
padding:0 20px;
}

button{
padding:12px 25px;
background:#1e90ff;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{background:#0d6efd;}

footer{
width:100%;
text-align:center;
padding:25px 0;
background:#111;
color:#aaa;
margin-top:80px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
<a href="index.html">Home</a>
<a href="projects.html">Projects</a>
</nav>

<div class="container">
<h1>Thomas J. Argo</h1>
<p>Computer Science Major | CAD Designer | Developer</p>

<h2>About Me</h2>
<p>
Freshman Computer Science major with experience in mechanical CAD design,
3D printing, and foundational programming.
</p>

<br>
<a href="projects.html">
<button>View Projects</button>
</a>
</div>

<footer>
Thomas J. Argo © 2026
</footer>

<script>
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
s:Math.random()*1.2+0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(255,255,255,0.35)";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y-=p.s;
if(p.y<0)p.y=canvas.height;
});
requestAnimationFrame(animate);
}
animate();

window.onresize=()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
};
</script>

</body>
</html>

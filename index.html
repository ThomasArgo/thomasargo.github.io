<!DOCTYPE html>
<html>
<head>
<title>Thomas J. Argo | Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f2027;
color:white;
overflow-x:hidden;
}

/* Stronger animated background */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* Navigation */
nav{
position:fixed;
top:0;
width:100%;
background:#111;
padding:15px 40px;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
margin-right:25px;
font-weight:bold;
}

nav a:hover{
opacity:.7;
}

.container{
max-width:1000px;
margin:120px auto 40px auto;
padding:0 20px;
}

h1{
font-size:2.5em;
margin-bottom:10px;
}

button{
padding:12px 25px;
background:#1e90ff;
border:none;
color:white;
font-size:1em;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0d6efd;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
<a href="index.html">Home</a>
<a href="projects.html">Projects</a>
</nav>

<div class="container">
<h1>Thomas J. Argo</h1>
<p>Computer Science Major | CAD Designer | Developer</p>

<h2>About Me</h2>
<p>
Freshman Computer Science major with experience in mechanical CAD design,
3D printing, and foundational programming.
</p>

<br>
<a href="projects.html">
<button>View Projects</button>
</a>
</div>

<script>
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
radius:Math.random()*3+1,
speed:Math.random()*1+0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(255,255,255,0.3)";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fill();
p.y-=p.speed;
if(p.y<0)p.y=canvas.height;
});
requestAnimationFrame(animate);
}
animate();

window.onresize=function(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
};
</script>

</body>
</html>
